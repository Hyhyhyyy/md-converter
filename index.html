<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD转换器 - 免费Markdown转PDF/Word</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.2.4/build/index.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
</head>
<body>
    <div class="geometric-bg">
        <div class="shape circle circle-1"></div>
        <div class="shape circle circle-2"></div>
        <div class="shape triangle triangle-1"></div>
        <div class="shape square square-1"></div>
        <div class="shape dots dots-1"></div>
    </div>

    <div class="container">
        <header class="header">
            <div class="logo-badge">
                <span class="logo-text">MD</span>
                <span class="logo-arrow">→</span>
                <span class="logo-text logo-pdf">PDF/Word</span>
            </div>
            <h1 class="title">Markdown 转换器</h1>
            <p class="subtitle">免费 · 本地转换 · 隐私安全</p>
        </header>

        <main class="converter">
            <div class="upload-section" id="uploadSection">
                <label class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" accept=".md,.markdown,.txt" hidden>
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none">
                        <path d="M12 4v12m0-12l4 4m-4-4l-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M4 20h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <p class="upload-title">拖拽或点击上传</p>
                    <p class="upload-hint">支持 .md .markdown .txt 文件</p>
                </label>
            </div>

            <div class="preview-section" id="previewSection" style="display: none;">
                <div class="preview-header-bar">
                    <span class="file-name" id="fileName"></span>
                    <button class="btn-remove" id="removeBtn">
                        <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
                            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>

                <div class="preview-tabs-bar">
                    <button class="tab active" data-tab="preview">预览</button>
                    <button class="tab" data-tab="source">源码</button>
                </div>

                <div class="preview-content">
                    <div class="preview-pane" id="previewPane"></div>
                    <div class="source-pane" id="sourcePane" style="display: none;"></div>
                </div>

                <div class="export-buttons">
                    <button class="btn-export btn-pdf" id="exportPdf">
                        <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.5"/>
                            <polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="1.5"/>
                            <text x="8" y="14" font-size="6" fill="currentColor" font-weight="bold">PDF</text>
                        </svg>
                        <span>导出 PDF</span>
                    </button>
                    <button class="btn-export btn-word" id="exportWord">
                        <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.5"/>
                            <polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="1.5"/>
                            <text x="6" y="14" font-size="6" fill="currentColor" font-weight="bold">DOCX</text>
                        </svg>
                        <span>导出 Word</span>
                    </button>
                </div>
            </div>
        </main>

        <section class="features">
            <div class="feature-row">
                <div class="feature-item">
                    <div class="feature-dot" style="background: linear-gradient(135deg, #FF6B6B, #FF8E8E);"></div>
                    <h4>完全免费</h4>
                    <p>无需注册付费</p>
                </div>
                <div class="feature-item">
                    <div class="feature-dot" style="background: linear-gradient(135deg, #4ECDC4, #6EE7B7);"></div>
                    <h4>隐私安全</h4>
                    <p>本地浏览器转换</p>
                </div>
                <div class="feature-item">
                    <div class="feature-dot" style="background: linear-gradient(135deg, #A78BFA, #C4B5FD);"></div>
                    <h4>即时导出</h4>
                    <p>支持表格/代码块</p>
                </div>
                <div class="feature-item">
                    <div class="feature-dot" style="background: linear-gradient(135deg, #FFD93D, #FFE5B4);"></div>
                    <h4>拖拽上传</h4>
                    <p>简单便捷操作</p>
                </div>
            </div>
        </section>

        <footer class="footer">
            <p>Made with ❤ for better documents</p>
        </footer>
    </div>

    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>正在转换...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
